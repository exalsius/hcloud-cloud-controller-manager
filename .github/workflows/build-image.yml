name: Build and Push Container Image

on:
  push:
    branches:
      - fix/lookup-server-by-name
      - v1.31.1-mod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch image tag
        id: branch-tag
        shell: bash
        run: |
          # github.ref_name is the branch or tag name that triggered the workflow
          ref_name="${GITHUB_REF_NAME}"
          # Docker tag rules are stricter than git refs; normalize to a safe tag.
          tag="$(echo "${ref_name}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##')"
          # Fallback just in case normalization produces empty string
          if [[ -z "${tag}" ]]; then
            tag="unknown-branch"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dev/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch-tag.outputs.tag }}
